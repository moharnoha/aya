<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إلى حبيبتي أية 💖</title>
<style>
  :root {
    --primary-color: #ff4d94;
    --secondary-color: #ffb3d1;
    --bg-color: #fff9fb;
    --text-dark: #4a4a4a;
    --shadow: 0 10px 25px rgba(255, 77, 148, 0.1);
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-dark);
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 650px;
    margin: 30px auto;
    background: #fff;
    padding: 40px 30px;
    border-radius: 30px;
    box-shadow: var(--shadow);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    color: var(--primary-color);
    font-size: 26px;
    margin-bottom: 15px;
  }

  .intro-text {
    color: #888;
    font-size: 16px;
    font-style: italic;
  }

  .question-card {
    background: #fff;
    border: 1.5px solid #f0f0f0;
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 25px;
    transition: all 0.3s ease;
  }

  .question-card:hover {
    border-color: var(--secondary-color);
    transform: translateY(-2px);
  }

  .question-text {
    font-weight: bold;
    display: block;
    margin-bottom: 15px;
    color: var(--primary-color);
    font-size: 18px;
  }

  label {
    display: flex;
    align-items: center;
    margin: 12px 0;
    cursor: pointer;
    padding: 10px;
    border-radius: 12px;
    background: #fafafa;
    transition: background 0.2s;
  }

  label:hover {
    background: #fff0f5;
  }

  input[type="radio"] {
    margin-left: 12px;
    accent-color: var(--primary-color);
    width: 18px;
    height: 18px;
  }

  textarea {
    width: 100%;
    height: 70px;
    margin-top: 15px;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    font-family: inherit;
    resize: none;
    box-sizing: border-box;
    font-size: 14px;
    background: #fdfdfd;
  }

  .notice-box {
    background-color: #fff0f5;
    border-right: 5px solid var(--primary-color);
    padding: 20px;
    margin: 25px 0;
    border-radius: 12px;
    font-size: 15px;
    color: #a0106b;
    line-height: 1.5;
  }

  button {
    width: 100%;
    background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%);
    color: white;
    padding: 18px;
    border: none;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 5px 15px rgba(255, 77, 148, 0.3);
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255, 77, 148, 0.4);
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: #d1d1d1;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>إلى أميرتي أية.. مساحة لقلبك 💖</h1>
    <p class="intro-text">أية، هذا المكان لكِ وحدكِ.. عبّري عن كل ما بداخلِكِ بصدق، أنا هنا لأسمعكِ دائماً.</p>
  </header>

  <form id="loveForm">
    <div id="questionsContainer"></div>

    <div class="notice-box">
      <strong>ملاحظة رقيقة لقلبك:</strong> 
      حبيبتي، بمجرد الضغط على الزر، سيتم تجهيز كلامكِ الجميل في رسالة واتساب، وبعدها يمكنكِ مراجعتها وإرسالها لي بضغطة واحدة لتصل لقلبي مباشرة.
    </div>

    <button type="button" onclick="sendWhatsApp()">أرسليها لقلبي الآن 💝</button>
  </form>

  <footer>صُنع بكل حب من أجلكِ</footer>
</div>

<script>
const questions = [
  {q:"1. ما شعورك تجاه اللحظات التي نقضيها معًا؟", options:["راحة واطمئنان","سعادة حقيقية","اشتياق عند الانفصال","كل ما سبق"]},
  {q:"2. عند التفكير بي، أي شعور يسيطر عليك غالبًا؟", options:["حنين واشتياق","دفء وطمأنينة","فضول لمعرفة المزيد عني","كل ما سبق"]},
  {q:"3. كيف تشعرين عندما أتحدث معك بصراحة؟", options:["راحة وثقة","فرح واهتمام","امتنان كبير","كل ما سبق"]},
  {q:"4. أي اللحظات الصغيرة معي تجعلك تبتسم أكثر؟", options:["ضحكنا معًا","لحظات دعمك لي","اللحظات العاطفية الصامتة","كل ما سبق"]},
  {q:"5. ما شعورك الداخلي عند غيابي؟", options:["اشتياق بسيط","حزن قليل","أفكر بك كثيرًا","كل ما سبق"]},
  {q:"6. عند تذكرك لي، ما أول شعور يخطر في بالك؟", options:["أمان وطمأنينة","حب واشتياق","سعادة ودفء","كل ما سبق"]},
  {q:"7. إذا حصل بيننا موقف صعب، شعورك سيكون؟", options:["قلق قليل","تفكير منطقي مع شعور داخلي","أشعر بدعم كبير","كل ما سبق"]},
  {q:"8. ما أكثر شيء يعكس مشاعرك لي؟", options:["دفء وحنان داخلي","سعادة وفرح داخلي","اشتياق واهتمام","كل ما سبق"]},
  {q:"9. كيف تصفين علاقتنا من منظورك الداخلي؟", options:["أمان واستقرار","حب ودفء","قوة المشاعر العميقة","كل ما سبق"]},
  {q:"10. إذا أعطيت نفسك فرصة للتعبير عن مشاعرك لي الآن، ماذا تختارين؟", options:["ابتسامة وطمأنينة","تفكير مليء بالحب","كتابة أو حديث صادق","كل ما سبق"]}
];

const container = document.getElementById('questionsContainer');

questions.forEach((item, index) => {
  let qHtml = `
    <div class="question-card">
      <span class="question-text">${item.q}</span>
      ${item.options.map((opt, i) => `
        <label>
          <input type="radio" name="q${index}" value="${i}">
          ${opt}
        </label>
      `).join('')}
      <textarea name="txt${index}" placeholder="أضيفي أي كلمة تودين قولها هنا..."></textarea>
    </div>
  `;
  container.innerHTML += qHtml;
});

function sendWhatsApp() {
  const radios = document.querySelectorAll('input[type="radio"]:checked');
  
  if(radios.length < questions.length) {
    alert('حبيبتي أية، يرجى الإجابة على جميع الأسئلة لتكتمل الرسالة 🌸');
    return;
  }

  let message = "*💖 رسالة من قلب أية الغالية 💖*\n\n";

  questions.forEach((q, i) => {
    const selectedRadio = document.querySelector(`input[name="q${i}"]:checked`);
    const extraText = document.getElementsByName(`txt${i}`)[0].value.trim();
    
    message += `*${q.q}*\n`;
    message += `← ${q.options[selectedRadio.value]}\n`;
    if(extraText) message += `*كلمة من أية:* ${extraText}\n`;
    message += `\n`;
  });

  const phoneNumber = "212688941181";
  window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, "_blank");
}
</script>

</body>
</html>
