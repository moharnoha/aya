<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأية – تجربة مشاعر راقية 💖</title>
<style>
  :root {
    --primary-color: #c71585;
    --secondary-color: #f8bbd0;
    --bg-color: #fdf7f9;
    --text-dark: #2d3436;
    --shadow: 0 4px 15px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-dark);
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: var(--shadow);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    color: var(--primary-color);
    font-size: 28px;
    margin-bottom: 10px;
  }

  .intro-text {
    color: #636e72;
    font-size: 15px;
  }

  .question-card {
    background: #fff;
    border: 1px solid #eee;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    transition: transform 0.2s;
  }

  .question-card:hover {
    border-color: var(--secondary-color);
  }

  .question-text {
    font-weight: 600;
    display: block;
    margin-bottom: 15px;
    color: var(--primary-color);
  }

  label {
    display: flex;
    align-items: center;
    margin: 10px 0;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  label:hover {
    background: var(--bg-color);
  }

  input[type="radio"] {
    margin-left: 10px;
    accent-color: var(--primary-color);
  }

  textarea {
    width: 100%;
    height: 60px;
    margin-top: 15px;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-family: inherit;
    resize: none;
    box-sizing: border-box;
  }

  .notice-box {
    background-color: #fff9db;
    border-right: 5px solid #fcc419;
    padding: 15px;
    margin: 20px 0;
    border-radius: 8px;
    font-size: 14px;
    color: #856404;
  }

  button {
    width: 100%;
    background-color: var(--primary-color);
    color: white;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
    box-shadow: 0 4px 10px rgba(199, 21, 133, 0.2);
  }

  button:hover {
    background-color: #a0106b;
  }

  footer {
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    color: #b2bec3;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>لأية – مساحة المشاعر الآمنة 💖</h1>
    <p class="intro-text">شاركينا ما يجول في خاطركِ بكل هدوء وصدق.</p>
  </header>

  <form id="loveForm">
    <div id="questionsContainer"></div>

    <div class="notice-box">
      <strong>ملاحظة هامة:</strong> 
      عند الضغط على زر الإرسال، سيتم تحويلكِ إلى تطبيق واتساب لمراجعة إجاباتكِ وإرسالها يدوياً. هذه الخطوة تضمن خصوصيتكِ الكاملة وتمنحكِ الفرصة لقراءة الرسالة قبل مشاركتها.
    </div>

    <button type="button" onclick="sendWhatsApp()">إرسال عبر واتساب</button>
  </form>

  <footer>جميع الحقوق محفوظة © 2026</footer>
</div>

<script>
const questions = [
  {q:"1. ما شعورك تجاه اللحظات التي نقضيها معًا؟", options:["راحة واطمئنان","سعادة حقيقية","اشتياق عند الانفصال","كل ما سبق"]},
  {q:"2. عند التفكير بي، أي شعور يسيطر عليك غالبًا؟", options:["حنين واشتياق","دفء وطمأنينة","فضول لمعرفة المزيد عني","كل ما سبق"]},
  {q:"3. كيف تشعرين عندما أتحدث معك بصراحة؟", options:["راحة وثقة","فرح واهتمام","امتنان كبير","كل ما سبق"]},
  {q:"4. أي اللحظات الصغيرة معي تجعلك تبتسم أكثر؟", options:["ضحكنا معًا","لحظات دعمك لي","اللحظات العاطفية الصامتة","كل ما سبق"]},
  {q:"5. ما شعورك الداخلي عند غيابي؟", options:["اشتياق بسيط","حزن قليل","أفكر بك كثيرًا","كل ما سبق"]},
  {q:"6. عند تذكرك لي، ما أول شعور يخطر في بالك؟", options:["أمان وطمأنينة","حب واشتياق","سعادة ودفء","كل ما سبق"]},
  {q:"7. إذا حصل بيننا موقف صعب، شعورك سيكون؟", options:["قلق قليل","تفكير منطقي مع شعور داخلي","أشعر بدعم كبير","كل ما سبق"]},
  {q:"8. ما أكثر شيء يعكس مشاعرك لي؟", options:["دفء وحنان داخلي","سعادة وفرح داخلي","اشتياق واهتمام","كل ما سبق"]},
  {q:"9. كيف تصفين علاقتنا من منظورك الداخلي؟", options:["أمان واستقرار","حب ودفء","قوة المشاعر العميقة","كل ما سبق"]},
  {q:"10. إذا أعطيت نفسك فرصة للتعبير عن مشاعرك لي الآن، ماذا تختارين؟", options:["ابتسامة وطمأنينة","تفكير مليء بالحب","كتابة أو حديث صادق","كل ما سبق"]}
];

const container = document.getElementById('questionsContainer');

questions.forEach((item, index) => {
  let qHtml = `
    <div class="question-card">
      <span class="question-text">${item.q}</span>
      ${item.options.map((opt, i) => `
        <label>
          <input type="radio" name="q${index}" value="${i}">
          ${opt}
        </label>
      `).join('')}
      <textarea name="txt${index}" placeholder="تعبير إضافي (اختياري)..."></textarea>
    </div>
  `;
  container.innerHTML += qHtml;
});

function sendWhatsApp() {
  const radios = document.querySelectorAll('input[type="radio"]:checked');
  
  if(radios.length < questions.length) {
    alert('لطفاً، أكملي الإجابة على جميع الأسئلة.');
    return;
  }

  let message = "*💖 نتائج استبيان المشاعر - أية 💖*\n\n";

  questions.forEach((q, i) => {
    const selectedRadio = document.querySelector(`input[name="q${i}"]:checked`);
    const extraText = document.getElementsByName(`txt${i}`)[0].value.trim();
    
    message += `*س: ${q.q}*\n`;
    message += `*ج:* ${q.options[selectedRadio.value]}\n`;
    if(extraText) message += `*توضيح:* ${extraText}\n`;
    message += `\n`;
  });

  const phoneNumber = "212688941181";
  window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, "_blank");
}
</script>

</body>
</html>
